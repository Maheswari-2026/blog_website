{% extends "base.html" %}
{% block content %}

<h2>Create Post</h2>

<form method="POST" enctype="multipart/form-data">

    <input type="text" name="title" placeholder="Title" required><br><br>

    {{ ckeditor.load() }}
    {{ ckeditor.create(name='content') }}

    <br>

    <input type="file" name="image"><br><br>

    <button type="submit">Publish</button>

</form>

{% endblock %}
